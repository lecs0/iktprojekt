<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RatZ Streaming</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/png" href="/imgs/1.png">
    <style>
        .user-menu {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-left: auto;
        }

        .user-username {
            color: #f3f4f6;
            font-size: 0.9rem;
        }

        .logout-btn {
            padding: 0.5rem 1rem;
            background: rgba(167, 139, 250, 0.2);
            color: #a78bfa;
            border: 1px solid rgba(167, 139, 250, 0.5);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
        }

        .logout-btn:hover {
            background: rgba(167, 139, 250, 0.3);
        }

        .profile-nav-btn {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: #f3f4f6;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.2s;
            border: 1px solid rgba(167,139,250,0.3);
        }

        .profile-nav-btn:hover {
            background: rgba(167,139,250,0.15);
            border-color: rgba(167,139,250,0.7);
            color: #a78bfa;
        }

        /* Continue Watching */
        .continue-watching-section {
            padding: 2rem 0 0.5rem;
        }

        .continue-watching-section h2 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #9ca3af;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .continue-watching-section h2 span {
            color: #a78bfa;
        }

        .cw-row {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            padding-bottom: 1rem;
            scrollbar-width: thin;
            scrollbar-color: rgba(167,139,250,0.4) transparent;
        }

        .cw-row::-webkit-scrollbar {
            height: 4px;
        }

        .cw-row::-webkit-scrollbar-thumb {
            background: rgba(167,139,250,0.4);
            border-radius: 2px;
        }

        .cw-card {
            flex-shrink: 0;
            width: 160px;
            cursor: pointer;
            border-radius: 10px;
            overflow: hidden;
            background: rgba(25,25,30,0.9);
            border: 1px solid rgba(167,139,250,0.15);
            transition: all 0.3s;
            position: relative;
        }

        .cw-card:hover {
            transform: translateY(-6px);
            border-color: rgba(167,139,250,0.6);
            box-shadow: 0 12px 30px rgba(167,139,250,0.2);
        }

        .cw-card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            display: block;
        }

        .cw-card-body {
            padding: 0.6rem 0.7rem 0.7rem;
        }

        .cw-title {
            font-size: 0.82rem;
            font-weight: 600;
            color: #f3f4f6;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.4rem;
        }

        .cw-progress-track {
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            height: 4px;
            overflow: hidden;
        }

        .cw-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #a78bfa, #8b5cf6);
            border-radius: 3px;
            transition: width 0.3s;
        }

        .cw-time-left {
            font-size: 0.68rem;
            color: #6b7280;
            margin-top: 0.3rem;
        }
    </style>
</head>
<body class="stream-page">
    <header class="stream-nav">
        <div class="stream-nav-left">
            <img src="/imgs/2.png" alt="logo" class="stream-logo">
            <nav class="stream-links">
                <a href="/">Home</a>
                <a href="#movies">Movies</a>
            </nav>
        </div>
        <div class="stream-nav-right">
            <input type="text" id="search-input" class="search-box" placeholder="Search movies...">
            <button class="search-btn">Search</button>
            <div class="user-menu" id="user-menu" style="display: none;">
                <a href="/profile" class="profile-nav-btn" id="profile-nav-link">
                        <span id="profile-nav-avatar" style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#6d28d9);display:inline-flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:#fff;overflow:hidden;flex-shrink:0;">?</span>
                        <span id="user-username"></span>
                    </a>
                <button class="logout-btn" id="logout-btn">Logout</button>
            </div>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-backdrop"></div>
            <div class="hero-content container">
                <p class="hero-tag">FEATURED TONIGHT</p>
                <h1 id="hero-title">Welcome to RatZ</h1>
                <p class="hero-description" id="hero-description">Discover thousands of movies and series</p>
                <div class="hero-actions">
                    <button class="hero-play" onclick="document.getElementById('movies').scrollIntoView({behavior:'smooth'})">Browse</button>
                </div>
            </div>
        </section>

        <section class="continue-watching-section container" id="continue-watching" style="display:none">
            <h2>▶ Continue <span>Watching</span></h2>
            <div class="cw-row" id="cw-row"></div>
        </section>

        <section class="content-rail container" id="movies">
            <h2>All Movies</h2>
            <div class="poster-row" id="movies-grid"></div>
        </section>
    </main>

    <footer class="stream-footer">
        <p>RatZ Streaming • Your favorite movies and series</p>
        <p>© 2026 RatZ</p>
    </footer>

    <script src="/js/app.js"></script>
    <script>
        // Check authentication on page load
        async function checkAuth() {
            try {
                const response = await fetch('/api/users/status');
                const data = await response.json();
                
                if (!data.authenticated) {
                    // Redirect to login if not authenticated
                    window.location.href = '/login';
                    return;
                }

                // Show user menu
                document.getElementById('user-menu').style.display = 'flex';
                document.getElementById('user-username').textContent = data.username;

                // Load avatar for nav
                fetch('/api/users/avatar').then(r => r.json()).then(a => {
                    const el = document.getElementById('profile-nav-avatar');
                    if (a.avatar && el) el.innerHTML = `<img src="${a.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
                    else if (el) el.textContent = data.username ? data.username.slice(0,2).toUpperCase() : '?';
                }).catch(() => {});

                // If password needs to be changed, redirect to login
                if (data.mustChangePassword) {
                    window.location.href = '/login';
                }
            } catch (error) {
                console.error('Auth check error:', error);
                window.location.href = '/login';
            }
        }

        // Logout handler
        document.getElementById('logout-btn').addEventListener('click', async () => {
            try {
                const response = await fetch('/api/users/logout', {
                    method: 'POST'
                });

                if (response.ok) {
                    window.location.href = '/login';
                }
            } catch (error) {
                console.error('Logout error:', error);
            }
        });

        // Check auth before loading movies
        checkAuth();

        async function loadContinueWatching() {
            try {
                const res = await fetch('/api/users/continue-watching');
                const items = await res.json();
                if (!items.length) return;

                const section = document.getElementById('continue-watching');
                const row = document.getElementById('cw-row');
                section.style.display = 'block';

                row.innerHTML = items.map(item => {
                    const pct = item.duration_seconds > 0
                        ? Math.min(100, Math.round((item.progress_seconds / item.duration_seconds) * 100))
                        : 0;
                    const secsLeft = Math.max(0, (item.duration_seconds || 0) - (item.progress_seconds || 0));
                    const minsLeft = Math.round(secsLeft / 60);
                    return `
                        <div class="cw-card" onclick="window.location.href='/movie/${item.movie_id}'">
                            <img src="${item.poster_img || 'https://via.placeholder.com/160x240?text=No+Image'}" alt="${item.title}"
                                 onerror="this.src='https://via.placeholder.com/160x240?text=No+Image'">
                            <div class="cw-card-body">
                                <div class="cw-title">${item.title}</div>
                                <div class="cw-progress-track">
                                    <div class="cw-progress-fill" style="width:${pct}%"></div>
                                </div>
                                <div class="cw-time-left">${minsLeft > 0 ? minsLeft + ' min left' : 'Almost done'}</div>
                            </div>
                        </div>`;
                }).join('');
            } catch(e) { /* no history yet */ }
        }

        // Load continue watching after auth
        fetch('/api/users/status').then(r => r.json()).then(d => {
            if (d.authenticated) loadContinueWatching();
        });
    </script>
</body>
</html>
