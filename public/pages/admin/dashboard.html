<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - RatZ</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-page">
    <div class="admin-container">
        <aside class="sidebar">
            <h2>RatZ Admin</h2>
            <nav>
                <a href="#" class="nav-link active" data-section="dashboard">Dashboard</a>
                <a href="#" class="nav-link" data-section="add-movie">Add Movie</a>
                <a href="#" class="nav-link" data-section="movies-list">Manage Movies</a>
                <a href="#" class="nav-link" data-section="users-list">Manage Users</a>
                <a href="#" class="nav-link" data-section="activity-log">Activity Log</a>
                <a href="#" class="nav-link logout" id="logout-btn">Logout</a>
            </nav>
        </aside>

        <main class="admin-main">
            <!-- Dashboard Section -->
            <section id="dashboard" class="admin-section active">
                <h1>Dashboard</h1>
                <div class="dashboard-stats">
                    <div class="stat-card">
                        <h3>Total Movies</h3>
                        <p id="total-movies">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Total Users</h3>
                        <p id="total-users">0</p>
                    </div>
                </div>
            </section>

            <!-- Add Movie Section -->
            <section id="add-movie" class="admin-section">
                <h1>Add New Movie</h1>
                <form id="add-movie-form" class="movie-form">
                    <div class="form-group">
                        <label>Title *</label>
                        <input type="text" name="title" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea name="description" rows="4"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Genre</label>
                            <input type="text" name="genre">
                        </div>
                        <div class="form-group">
                            <label>Release Year</label>
                            <input type="number" name="release_year">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Duration (minutes)</label>
                            <input type="number" name="duration">
                        </div>
                        <div class="form-group">
                            <label>Country</label>
                            <input type="text" name="country">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Director</label>
                        <input type="text" name="director">
                    </div>
                    <div class="form-group">
                        <label>Cast</label>
                        <input type="text" name="cast" placeholder="Comma separated">
                    </div>
                    <div class="form-group">
                        <label>Rating (0-10)</label>
                        <input type="number" name="rating" min="0" max="10" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>Poster Image</label>
                        <input type="file" name="poster" accept="image/*">
                    </div>
                    <div class="form-group">
                        <label>Video Link (VK, YouTube, etc)</label>
                        <input type="url" name="video_link">
                    </div>
                    <button type="submit" class="btn-primary">Add Movie</button>
                </form>
            </section>

            <!-- Movies List Section -->
            <section id="movies-list" class="admin-section">
                <h1>Manage Movies</h1>
                <div id="movies-table-container"></div>
            </section>

            <!-- Users List Section -->
            <section id="users-list" class="admin-section">
                <h1>Manage Users</h1>
                <div class="add-user-form-container">
                    <h3>Add New User</h3>
                    <form id="add-user-form" class="movie-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Username *</label>
                                <input type="text" name="username" required>
                            </div>
                            <div class="form-group">
                                <label>Email *</label>
                                <input type="email" name="email" required>
                            </div>
                        </div>
                        <button type="submit" class="btn-primary">Create User</button>
                    </form>
                </div>
                <div id="users-table-container"></div>
            </section>

            <section id="activity-log" class="admin-section">
                <h1>Activity Log</h1>
                <div class="logs-header-actions">
                    <button class="btn-primary" id="refresh-logs-btn" type="button">Refresh Logs</button>
                </div>
                <div id="logs-table-container"></div>
            </section>
        </main>
    </div>

    <script src="../js/admin.js"></script>
</body>
</html>
