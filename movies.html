<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>RatZ</title>

<body class="stream-page">
	<script src="ads.js"></script>
	<script src="randomProfilkep.js"></script>
	<div class="ad-container ad-bottom-right" id="ad-container"></div>
	<header class="stream-nav">
		<div class="stream-nav-left">
			<a href="https://github.com/RatZ-org" target="_blank">
			<img src="imgs/2.png" alt="logo" class="stream-logo">
			</a>
			<nav class="stream-links">
				<a href="main.html" title="Go to the home page">Home</a>
				<a>Movies</a>
				<a href="https://open.spotify.com/playlist/1bYK6vRq6eCEdo7YGowFkb" title="My list">My list</a>
				<a href="https://www.youtube.com/@einerecords" target="_blank" title="Geeker radio">Türr.fm</a>
				<a href="https://gyogyitokezekhaza.lapunk.hu/tibeti-hangtal-terapia-1188130" target="_blank"
					title="Trust the process">Therapy</a>
			</nav>
		</div>
		<div class="stream-nav-right">
			<button class="stream-nav-btn">Search</button>
			<button class="stream-nav-btn">Status</button>
			<div class="dropdown">
				<button class="stream-profile" id="accountDropdown" data-bs-toggle="dropdown"
					aria-expanded="false"></button>
				<ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark" aria-labelledby="accountDropdown">
					<li>
						<h6 class="dropdown-header">My Account</h6>
					</li>
					<li>
						<hr class="dropdown-divider">
					</li>
					<li><a class="dropdown-item" href="#">Profile</a>
					</li>
					<li><a class="dropdown-item" href="#">Settings</a>
					</li>
					<li>
						<hr class="dropdown-divider">
					</li>
					<li><a class="dropdown-item text-danger" href="index.html">Sign out</a>
					</li>
				</ul>
			</div>
		</div>
	</header>
    <main>
		<div id="movieCont" class="movieCont">
		</div>
		<div class="like-button">
				<input class="on" id="heart" type="checkbox" />
				<label class="like" for="heart">
					<svg class="like-icon" fill-rule="nonzero" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
						<path d="m11.645 20.91-.007-.003-.022-.012a15.247 15.247 0 0 1-.383-.218 25.18 25.18 0 0 1-4.244-3.17C4.688 15.36 2.25 12.174 2.25 8.25 2.25 5.322 4.714 3 7.688 3A5.5 5.5 0 0 1 12 5.052 5.5 5.5 0 0 1 16.313 3c2.973 0 5.437 2.322 5.437 5.25 0 3.925-2.438 7.111-4.739 9.256a25.175 25.175 0 0 1-4.244 3.17 15.247 15.247 0 0 1-.383.219l-.022.012-.007.004-.003.001a.752.752 0 0 1-.704 0l-.003-.001Z"></path>
					</svg>
					<span class="like-text">Likes</span>
				</label>
				<span class="like-count one">66</span>
				<span class="like-count two">67</span>
			</div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="flimBetoltesLogika.js"></script>
