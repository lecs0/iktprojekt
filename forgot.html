<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Contact us</title>
    <link rel="icon" type="image/png" href="imgs/2.png">
    <script src="ads.js"></script>
</head>
<body class="background d-flex flex-column min-vh-100" style="overflow: hidden;">
    <div class="ad-container ad-bottom-right" id="ad-container">
    </div>
    <nav class="top-bar">
        <div class="logo-container">
            <img src="imgs/2.png" alt="logo" class="logo">
        </div>
    </nav>
    <main class="d-flex flex-column justify-content-center align-items-center flex-grow-1 gap-3">
        <h3 class="text-white text-center mb-3">You can contact us here:</h3>
        <!-- From Uiverse.io by joe-watson-sbf --> 
        <div class="cards">
        <a class="flip-card" href="https://discord.gg/msdtvPpSkJ" target="_blank">
            <div class="flip-card-inner">
                <div class="flip-card-front">
                    <img class="card-bg" src="imgs/" alt="Áron">
                </div>
                <div class="flip-card-back">
                    <p class="card-text">Click here to contact me</p>
                </div>
            </div>
        </a>
        <a class="flip-card" href="https://discord.gg/rB2BfhSde9" target="_blank">
            <div class="flip-card-inner">
                <div class="flip-card-front">
                    <img class="card-bg" src="imgs/" alt="Dominik">
                </div>
                <div class="flip-card-back">
                    <p class="card-text">Click here to contact me</p>
                </div>
            </div>
        </a>
    </div>
</main>
<footer class="stream-footer" style="margin-top: auto;">
        <p>RatZ way. - anything is possible</p>
        <p>© 2026 RatZ</p>
    </footer>
</body>
</html>
