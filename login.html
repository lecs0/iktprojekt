<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Bejelentkezés</title>
</head>

<body class="background">

    <nav class="top-bar">
        <div class="logo-container">
            <img src="imgs/2.png" alt="logo" class="logo">
        </div>
    </nav>

    <div class="ad-container ad-bottom-right" id="ad-container">
    </div>

    <div class="container d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 60px); margin-top: 60px;">
        <div class="card form-container">
            <form class="form">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" name="username" id="username" placeholder="">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" id="password" placeholder="">
                    <div class="text-end mt-2">
                        <a rel="noopener noreferrer" href="#" class="small text-muted">Forgot Password ?</a>
                    </div>
                </div>
                <button class="btn btn-primary w-100 mt-1">Sign in</button>
            </form>
            <p class="text-center text-muted mt-2 small">Don't have an account?
                <a rel="noopener noreferrer" href="register.html" class="text-decoration-none">Sign up</a>
            </p>
        </div>
    </div>

    <script>
        const ads = [
            { text: "FREE DOWNLOAD NOW!", link: "https://youtu.be/psha3ecS5K8", image: "imgs/ad1.png" },
            { text: "Click here to WIN BIG!", link: "https://youtu.be/psha3ecS5K8", image: "imgs/ad2.png" },
            { text: "Hurry! BUDAPEST NYUGATI PÁLYAUDVAR GAMEPLAY 2026!", link: "https://youtu.be/mZoHGuK_Psg", image: "imgs/ad3.png" },
            { text: "Jeffrey meghivott a szigetére! Klikk az elfogadáshoz", link: "https://youtu.be/yw_LlM6s5aI", image: "imgs/ad4.jpg"}
        ];
        function getRandomAd() {
            const randomIndex = Math.floor(Math.random() * ads.length);
            return ads[randomIndex];
        }
        window.onload = function() {
            const ad = getRandomAd();
            const adContainer = document.getElementById("ad-container");
            adContainer.innerHTML = `
                <a href="${ad.link}" target="_blank">
                    <img src="imgs/small_x_icon_212667.png" alt="x" class="close-btn">
                    <img src="${ad.image}" alt="Ad">
                    <p>${ad.text}</p>
                </a>
            `;
        };
    </script>
</body>

</html>
