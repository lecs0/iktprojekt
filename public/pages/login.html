<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RatZ Streaming</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="imgs/1.png">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0f10 0%, #1a1a2e 100%);
            padding: 1rem;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            background: rgba(15, 15, 16, 0.95);
            border: 1px solid rgba(167, 139, 250, 0.2);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .login-box h1 {
            color: #a78bfa;
            margin-bottom: 0.5rem;
            font-size: 2rem;
            text-align: center;
        }

        .login-box p {
            color: #9ca3af;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: #f3f4f6;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid rgba(167, 139, 250, 0.3);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            color: #f3f4f6;
            font-size: 1rem;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #a78bfa;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 1rem;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(167, 139, 250, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            padding: 0.75rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 6px;
            display: none;
        }

        .success-msg {
            color: #10b981;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            padding: 0.75rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 6px;
            display: none;
        }

        .change-password-form {
            display: none;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(167, 139, 250, 0.2);
        }

        .back-link {
            display: block;
            text-align: center;
            color: #a78bfa;
            text-decoration: none;
            font-size: 0.9rem;
            margin-top: 1rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #c4b5fd;
        }

        @media (max-width: 480px) {
            .login-box {
                padding: 1.5rem;
            }

            .login-box h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body class="stream-page">
    <div class="login-container">
        <div class="login-box">
            <h1>RatZ</h1>
            <p>Streaming Platform</p>

            <div class="error-msg" id="error-msg"></div>
            <div class="success-msg" id="success-msg"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="login-btn" id="login-btn">Login</button>
            </form>

            <div class="change-password-form" id="change-password-form">
                <h3 style="color: #a78bfa; margin-bottom: 1rem;">Change Your Password</h3>
                <form id="password-change-form">
                    <div class="form-group">
                        <label for="old-password">Current Password</label>
                        <input type="password" id="old-password" name="oldPassword" required placeholder="Current password">
                    </div>
                    <div class="form-group">
                        <label for="new-password">New Password</label>
                        <input type="password" id="new-password" name="newPassword" required placeholder="New password (min 6 chars)">
                    </div>
                    <button type="submit" class="login-btn" id="change-btn">Change Password</button>
                </form>
            </div>

            <a href="/" class="back-link">← Back to Home</a>
        </div>
    </div>

    <script>
        // Check if already logged in
        async function checkAuthStatus() {
            try {
                const response = await fetch('/api/users/status');
                const data = await response.json();
                
                if (data.authenticated) {
                    if (data.mustChangePassword) {
                        document.getElementById('login-form').style.display = 'none';
                        document.getElementById('change-password-form').style.display = 'block';
                    } else {
                        // Already logged in and password changed
                        window.location.href = '/';
                    }
                }
            } catch (error) {
                console.error('Auth check error:', error);
            }
        }

        // Login form handler
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('login-btn');

            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';

            try {
                const response = await fetch('/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    if (data.mustChangePassword) {
                        document.getElementById('login-form').style.display = 'none';
                        document.getElementById('change-password-form').style.display = 'block';
                        showSuccessMessage('Login successful! Please change your password.');
                    } else {
                        showSuccessMessage('Login successful! Redirecting...');
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 1000);
                    }
                } else {
                    showErrorMessage(data.error || 'Login failed');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                }
            } catch (error) {
                console.error('Login error:', error);
                showErrorMessage('An error occurred. Please try again.');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });

        // Password change form handler
        document.getElementById('password-change-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const oldPassword = document.getElementById('old-password').value;
            const newPassword = document.getElementById('new-password').value;
            const changeBtn = document.getElementById('change-btn');

            if (newPassword.length < 6) {
                showErrorMessage('New password must be at least 6 characters');
                return;
            }

            changeBtn.disabled = true;
            changeBtn.textContent = 'Changing...';

            try {
                const response = await fetch('/api/users/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ oldPassword, newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccessMessage('Password changed successfully! Redirecting...');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showErrorMessage(data.error || 'Failed to change password');
                    changeBtn.disabled = false;
                    changeBtn.textContent = 'Change Password';
                }
            } catch (error) {
                console.error('Password change error:', error);
                showErrorMessage('An error occurred. Please try again.');
                changeBtn.disabled = false;
                changeBtn.textContent = 'Change Password';
            }
        });

        function showErrorMessage(msg) {
            const errorDiv = document.getElementById('error-msg');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
        }

        function showSuccessMessage(msg) {
            const successDiv = document.getElementById('success-msg');
            successDiv.textContent = msg;
            successDiv.style.display = 'block';
        }

        // Check auth status on load
        checkAuthStatus();
    </script>
</body>
</html>
