<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="icon" type="image/png" href="imgs/1.png">
    <script src="js/ads.js"></script>
    <title>Bejelentkezés</title>
</head>
<body class="background login-page d-flex flex-column min-vh-100">
    <nav class="navbar navbar-dark app-navbar fixed-top shadow-sm">
        <div class="container-fluid px-3 px-lg-4">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="imgs/2.png" alt="logo" class="stream-logo">
            </a>
        </div>
    </nav>
    <div class="ad-container ad-bottom-right position-fixed rounded-4 p-4 mt-5 text-center overflow-hidden" id="ad-container">
    </div>

    <div id="popup" class="popup position-fixed">
        <div class="popup-content">
            <img src="imgs/albanianvirus.png" alt="">
        </div>
    </div>
    <script src="js/popup.js"></script>
    <main class="container flex-grow-1 d-flex align-items-center justify-content-center py-5 pt-5">
        <div class="row justify-content-center w-100">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
                <div class="form-container p-5 rounded-5 mx-auto">
                    <form class="form">
                        <div class="mb-3">
                            <label for="username" class="form-label">Felhasználónév</label>
                            <input type="text" class="form-control" name="username" id="username" placeholder="">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Jelszó</label>
                            <input type="password" class="form-control" name="password" id="password" placeholder="">
                            <div class="text-center mt-2">
                                <a rel="noopener noreferrer" id="forgor" href="forgot.html" class="text-center text-muted mt-5 small text-decoration-none">Elfelejtettem a jelszavam</a>
                            </div>
                        </div>
                        <button type="button" class="btn btn-primary w-100 mt-1" onclick="window.location.href='main.html'">Bejelentkezés</button>
                    </form>
                    <p id="gif-text" class="text-center text-muted mt-3 small" style="cursor:pointer">Ez egy privát szolgáltatás!</p>
                </div>
            </div>
        </div>
    </main>
    <div id="gif-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); justify-content:center; align-items:center; z-index:1050;">
        <img id="gif-image" src="imgs/flashbang.gif" alt="gif">
    </div>
    <footer class="stream-footer mt-auto">
        <p>RatZ way. - Bármi lehetséges, ha geeker vagy</p>
        <p>© 2026 RatZ | Minden jog fenntartva</p>
    </footer>
    <script src="js/gif.js" defer></script>
</body>
</html>
