<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
            crossorigin="anonymous"
        />
    <style>
        .ad-container {
            border-radius: 12px;
            padding: 5px;
            text-align: center;
            font-family: 'Arial', sans-serif;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            max-width: 350px;
            margin: 0 auto;
            margin-top: 20px;
        }
        .ad-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.15);
        }
        .ad-container img {
            width: 150px;
            height: 100px;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .ad-container a {
            text-decoration: none;
            color: inherit;
        }
        .ad-container p {
            color: rgb(0, 0, 0);
            font-weight: bold;
            font-size: 16px;
            margin: 0;
        }

        .ad-top-right {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        .ad-top-left {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }
        .ad-bottom-right {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
        .ad-bottom-left {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
        }

    </style>
</head>
<body>
    <div class="ad-container ad-bottom-right" id="ad-container">
    </div>


    <p>lorem</p>

    <script>
        const ads = [
            { text: "FREE DOWNLOAD NOW!", link: "https://youtu.be/psha3ecS5K8", image: "imgs/ad1.png" },
            { text: "Click here to WIN BIG!", link: "https://youtu.be/psha3ecS5K8", image: "imgs/ad2.png" },
            { text: "Hurry! BUDAPEST NYUGATI PÁLYAUDVAR GAMEPLAY 2026!", link: "https://youtu.be/mZoHGuK_Psg", image: "imgs/ad3.png" },
            { text: "Jeffrey meghivott a szigetére! Klikk az elfogadáshoz", link: "https://youtu.be/yw_LlM6s5aI", image: "imgs/ad4.jpg"}
        ];
        function getRandomAd() {
            const randomIndex = Math.floor(Math.random() * ads.length);
            return ads[randomIndex];
        }
        window.onload = function() {
            const ad = getRandomAd();
            const adContainer = document.getElementById("ad-container");
            adContainer.innerHTML = `
                <a href="${ad.link}" target="_blank">
                    <img src="imgs/small_x_icon_212667.png" alt="x" class="float-end" style="width: 30px; height: 30px; position: absolute; top: 5px; right: 5px;">
                    <img src="${ad.image}" alt="Ad">
                    <p>${ad.text}</p>
                </a>
            `;
        };
    </script>

</body>
</html>
