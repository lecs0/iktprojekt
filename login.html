<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Bejelentkezés</title>
</head>
<body>
    <div class="logtitle">
        <p>
            Bejelentkezés
        </p>
    </div>

    <div class="login">
        <form>
            <p>
            <label for="felhasznalonev">Felhasználónév:</label>
            <input type="text" id="felhasznalonev" class="felhasznalonev" required>
        </p>
        <form>
            <p>
            <label for="jelszo">Jelszó:</label>
            <input type="text" id="jelszo" class="jelszo" required>
        </p>
        <p>
            <button id="gomb" >Bejelentkezés</button>
        </p>
        </form>
        <p id="register">
            Nincs fiókod? Regisztrálj <a href="register.html">ide</a> kattintva
        </p>
        <p>
            <button>Elfelejtettem a jelszavam</button>
        </p>
</body>
</html>
