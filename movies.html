<!DOCTYPE html>
<html lang="hu">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>RatZ</title>
	<link rel="stylesheet" href="style/styles.css">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<link rel="icon" type="image/png" href="imgs/1.png">
</head>
<body class="stream-page d-flex flex-column">
	<script src="js/ads.js"></script>
	<script src="js/randomProfilkep.js"></script>
	<div id="popup" class="popup position-fixed">
        <div class="popup-content">
            <img src="imgs/albanianvirus.png" alt="">
        </div>
    </div>
    <script src="js/popup.js"></script>
	<div id="gif-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); justify-content:center; align-items:center; z-index:1050;">
        <img id="gif-image" src="imgs/flashbang.gif" alt="gif">
    </div>
	<div class="ad-container ad-bottom-right position-fixed rounded-4 p-4 mt-5 text-center overflow-hidden" id="ad-container">
	</div>
	<header>
		<nav class="navbar navbar-expand-lg navbar-dark app-navbar fixed-top shadow-sm">
			<div class="container-fluid px-3 px-lg-4">
				<a class="navbar-brand d-flex align-items-center" href="main.html">
					<img src="imgs/2.png" alt="logo" class="stream-logo">
				</a>
				<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#moviesNavbar" aria-controls="moviesNavbar" aria-expanded="false" aria-label="Toggle navigation">
					<span class="navbar-toggler-icon"></span>
				</button>
				<div class="collapse navbar-collapse" id="moviesNavbar">
					<ul class="navbar-nav me-auto mb-2 mb-lg-0">
						<li class="nav-item"><a class="nav-link" href="main.html">Főoldal</a></li>
						<li class="nav-item"><a class="nav-link active" href="#">Filmek</a></li>
					</ul>
					<div class="d-flex align-items-center gap-2">
						<div class="dropdown">
							<button class="stream-profile rounded-2" id="accountDropdown" data-bs-toggle="dropdown" aria-expanded="false"></button>
							<ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark" aria-labelledby="accountDropdown">
								<li><h6 class="dropdown-header">Fiók</h6></li>
								<li><hr class="dropdown-divider"></li>
								<li><a class="dropdown-item" href="#">Profil</a></li>
								<li><a class="dropdown-item" href="#">Beállítások</a></li>
								<li><hr class="dropdown-divider"></li>
								<li><a class="dropdown-item text-danger" href="index.html">Kijelentkezés</a></li>
							</ul>
						</div>
					</div>
				</div>
			</div>
		</nav>
	</header>
	<main class="pt-5">
		<script src="js/filmBetoltesLogika.js"></script>
		<section class="content-rail container py-4 mt-4">
			<div class="movies-header-row gap-1 d-flex align-items-center justify-content-between mb-1">
				<h1 class="movies-header-title">Az összes film</h1>
				<div id="movies-search-wrapper" class="movies-search-inline">
					<input id="movies-search-input" type="text" class="form-control movies-search-input rounded-5" placeholder="Keresés cím alapján...">
				</div>
			</div>
			<small id="movies-search-result" class="movies-search-result mb-1"></small>
			<div class="row g-2" id="poster-row">
			</div>
		</section>
</main>
	<footer class="stream-footer">
		<p>RatZ way. - Bármi lehetséges, ha geeker vagy</p>
		<p>© 2026 RatZ | Minden jog fenntartva</p>
	</footer>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
