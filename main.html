<!DOCTYPE html>
<html lang="hu">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>StreamFlix</title>
	<link rel="stylesheet" href="styles.css">
    <script src="ads.js"></script>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="stream-page">


    <div class="ad-container ad-bottom-right" id="ad-container"></div>


	<header class="stream-nav">
		<div class="stream-nav-left">
			<img src="imgs/2.png" alt="logo" class="stream-logo">
			<nav class="stream-links">
				<a href="#">Home</a>
				<a href="#">Movies</a>
				<a href="#">My List</a>
			</nav>
		</div>
		<div class="stream-nav-right">
			<button class="stream-nav-btn">Search</button>
			<button class="stream-nav-btn">Status</button>
			<button class="stream-profile">U</button>
		</div>
	</header>

	<main>
		<section class="hero">
			<div class="hero-backdrop"></div>
			<div class="hero-content container">
				<p class="hero-tag">FEATURED TONIGHT</p>
				<h1>TITLE</h1>
				<p class="hero-description">desc</p>
				<div class="hero-actions">
					<button class="hero-play">Play</button>
					<button class="hero-more">More Info</button>
				</div>
			</div>
		</section>

		<section class="content-rail container">
			<h2>content-rail</h2>
			<div class="poster-row">
				<article class="poster-card"><img src="imgs/" alt="poster 1"><span>1</span></article>
				<article class="poster-card"><img src="imgs/" alt="poster 2"><span>2</span></article>
				<article class="poster-card"><img src="imgs/" alt="poster 3"><span>3</span></article>
				<article class="poster-card"><img src="imgs/" alt="poster 4"><span>4</span></article>
				<article class="poster-card"><img src="imgs/" alt="poster 5"><span>5</span></article>
				<article class="poster-card"><img src="imgs/" alt="poster 6"><span>6</span></article>
			</div>
		</section>

	</main>

	<footer class="stream-footer">
		<p>RatZ way. - anything is possible</p>
	</footer>
</body>

</html>
