<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="icon" type="image/png" href="imgs/1.png">
    <script src="ads.js"></script>
    <title>Log in</title>
</head>
<body class="background">
    <nav class="top-bar">
        <div class="logo-container">
            <img src="imgs/2.png" alt="logo" class="logo">
        </div>
    </nav>
    <div class="ad-container ad-bottom-right" id="ad-container">
    </div>
    <div class="container d-flex justify-content-center align-items-center login-main">
        <div class="form-container">
            <form class="form">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" name="username" id="username" placeholder="">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" id="password" placeholder="">
                    <div class="text-end mt-2">
                        <a rel="noopener noreferrer" id="forgor" href="forgot.html" class="small text-muted">Forgot
                            password?</a>
                    </div>
                </div>
                <button type="button" class="btn btn-primary w-100 mt-1" onclick="window.location.href='main.html'">Sign
                    in</button>
            </form>
            <p id="gif-text" class="text-center text-muted mt-2 small" style="cursor:pointer">This is a private service!
            </p>
        </div>
    </div>
    <div id="gif-overlay"
        style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); justify-content:center; align-items:center; z-index:1050;">
        <img id="gif-image" src="" alt="gif">
    </div>
    <script src="gif.js" defer></script>
    <footer class="stream-footer">
        <p>RatZ way. - anything is possible</p>
        <p>© 2026 RatZ</p>
    </footer>
</body>
</html>
